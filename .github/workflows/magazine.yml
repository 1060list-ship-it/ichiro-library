name: Weekly Magazine Generation

on:
  schedule:
    # 毎週金曜 07:00 JST (木曜 22:00 UTC) に実行
    - cron: '0 22 * * 4'
  workflow_dispatch:
    inputs:
      date:
        description: '処理対象日 YYYY-MM-DD（デフォルト: 昨日）'
        required: false
        default: ''
      weeks_ago:
        description: '何週前か（0=今週、1=先週）'
        required: false
        default: '0'
      dry_run:
        description: 'dry-run（書き込みなし）'
        required: false
        default: 'false'
        type: boolean

jobs:
  magazine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/pipeline/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r packages/pipeline/requirements.txt
          pip install tenacity

      - name: Update video statistics
        working-directory: packages/pipeline
        run: python update_likes.py

      - name: Validate and run magazine generation
        env:
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_WEEKS_AGO: ${{ github.event.inputs.weeks_ago || '0' }}
          INPUT_DRY: ${{ github.event.inputs.dry_run || 'false' }}
        working-directory: packages/pipeline
        run: |
          # 数値バリデーション
          if ! echo "$INPUT_WEEKS_AGO" | grep -qE '^[0-9]+$'; then
            echo "ERROR: weeks_ago must be a number" && exit 1
          fi

          # 日付バリデーション（空 or YYYY-MM-DD のみ許可）
          if [ -n "$INPUT_DATE" ] && ! echo "$INPUT_DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: date must be YYYY-MM-DD format" && exit 1
          fi

          ARGS=""
          if [ -n "$INPUT_DATE" ]; then
            ARGS="--date $INPUT_DATE"
          elif [ "$INPUT_WEEKS_AGO" != "0" ]; then
            ARGS="--weeks-ago $INPUT_WEEKS_AGO"
          fi

          python weekly_magazine.py $ARGS
